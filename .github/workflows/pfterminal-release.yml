name: pfterminal-release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version; must match codex-rs/Cargo.toml."
        required: true
        type: string
        default: "0.0.0"
      publish_release:
        description: "Create or update the matching GitHub release."
        required: true
        type: boolean
        default: false
      make_latest:
        description: "Mark the GitHub release as latest when publishing."
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate version
        id: version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]]; then
            echo "release_version must be x.y.z, x.y.z-alpha.N, or x.y.z-beta.N"
            exit 1
          fi

          cargo_version="$(grep -m1 '^version' codex-rs/Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          if [[ "$RELEASE_VERSION" != "$cargo_version" ]]; then
            echo "release_version ${RELEASE_VERSION} does not match codex-rs/Cargo.toml ${cargo_version}"
            exit 1
          fi

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=rust-v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: validate
    name: Build macOS package - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_STRIP: "symbols"
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Configure rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: ${{ matrix.target }}

      - name: Build pfterminal package binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path codex-rs/Cargo.toml \
            --target "$TARGET" \
            --release \
            --bin pfterminal

      - name: Build standalone package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${TARGET}"
          python3 scripts/build_codex_package.py \
            --target "$TARGET" \
            --variant pfterminal \
            --entrypoint-bin "codex-rs/target/${TARGET}/release/pfterminal" \
            --extra-bin "codex=codex-rs/target/${TARGET}/release/pfterminal" \
            --cargo-profile release \
            --package-dir "${RUNNER_TEMP}/pfterminal-package-${TARGET}" \
            --archive-output "dist/${TARGET}/pfterminal-package-${TARGET}.tar.gz" \
            --force

      - name: Smoke test package archive
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/${TARGET}/pfterminal-package-${TARGET}.tar.gz"
          package_dir="${RUNNER_TEMP}/smoke-${TARGET}"
          mkdir -p "$package_dir"
          tar -xzf "$archive" -C "$package_dir"
          "$package_dir/bin/pfterminal" --version
          test -x "$package_dir/bin/codex"
          test -x "$package_dir/codex-path/rg"

      - name: Upload macOS package archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pfterminal-package-${{ matrix.target }}
          path: dist/${{ matrix.target }}/pfterminal-package-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          compression-level: 0

  build-linux:
    needs: validate
    name: Build Linux package - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_STRIP: "symbols"
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux package prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config \
            libcap-dev

      - if: ${{ contains(matrix.target, 'linux-musl') }}
        name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - if: ${{ contains(matrix.target, 'linux-musl') }}
        name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - if: ${{ contains(matrix.target, 'linux-musl') }}
        name: Install musl build tools
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ contains(matrix.target, 'linux-musl') }}
        name: Disable aws-lc jitter entropy (musl)
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"

      - name: Configure rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: ${{ matrix.target }}

      - name: Build pfterminal package binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path codex-rs/Cargo.toml \
            --target "$TARGET" \
            --release \
            --bin pfterminal

      - name: Build standalone package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${TARGET}"
          python3 scripts/build_codex_package.py \
            --target "$TARGET" \
            --variant pfterminal \
            --entrypoint-bin "codex-rs/target/${TARGET}/release/pfterminal" \
            --extra-bin "codex=codex-rs/target/${TARGET}/release/pfterminal" \
            --cargo-profile release \
            --package-dir "${RUNNER_TEMP}/pfterminal-package-${TARGET}" \
            --archive-output "dist/${TARGET}/pfterminal-package-${TARGET}.tar.gz" \
            --force

      - name: Smoke test package archive
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/${TARGET}/pfterminal-package-${TARGET}.tar.gz"
          package_dir="${RUNNER_TEMP}/smoke-${TARGET}"
          mkdir -p "$package_dir"
          tar -xzf "$archive" -C "$package_dir"
          "$package_dir/bin/pfterminal" --version
          test -x "$package_dir/bin/codex"
          test -x "$package_dir/codex-path/rg"
          test -x "$package_dir/codex-resources/bwrap"

      - name: Upload Linux package archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pfterminal-package-${{ matrix.target }}
          path: dist/${{ matrix.target }}/pfterminal-package-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          compression-level: 0

  assemble-release-assets:
    needs:
      - validate
      - build-macos
      - build-linux
    name: Assemble release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download package archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: downloaded
          pattern: pfterminal-package-*

      - name: Build checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-dist
          find downloaded -type f -name 'pfterminal-package-*.tar.gz' -exec cp {} release-dist/ \;
          cp scripts/install/install.sh release-dist/install.sh

          find release-dist -maxdepth 1 -type f -name 'pfterminal-package-*.tar.gz' -print |
            sort |
            while IFS= read -r archive; do
              sha256sum "$archive" |
                awk -v name="$(basename "$archive")" '{ print $1 "  " name }'
            done > release-dist/pfterminal-package_SHA256SUMS

          expected_count=4
          actual_count="$(find release-dist -maxdepth 1 -type f -name 'pfterminal-package-*.tar.gz' | wc -l | tr -d ' ')"
          if [[ "$actual_count" != "$expected_count" ]]; then
            echo "Expected ${expected_count} package archives, found ${actual_count}"
            find release-dist -maxdepth 1 -type f -print
            exit 1
          fi

          cat release-dist/pfterminal-package_SHA256SUMS

      - name: Upload release asset bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pfterminal-release-assets
          path: release-dist/*
          if-no-files-found: error
          compression-level: 0

      - name: Create or update GitHub release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.validate.outputs.version }}
          files: release-dist/*
          overwrite_files: true
          make_latest: ${{ inputs.make_latest }}
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
